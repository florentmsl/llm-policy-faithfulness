defaults:
  game: freeway
  model: "nvidia/nemotron-3-super-120b-a12b:free"
  icl_file: 03_prompts/in_context/scobots.txt
  templates:
    q1: 03_prompts/templates/q1_research.txt
    q2: 03_prompts/templates/q2_research.txt
    q3: 03_prompts/templates/q3_research.txt
    q4: 03_prompts/templates/q4_research.txt

experiments:
  - id: fw-q1-aligned-full-context
    rq: q1
    policy_file: 01_policies/scobots/freeway/aligned.py
    expected_behavior: "Advances the chicken through traffic, backs up or waits near cars, and scores crossings."
    env_file: 02_contexts/freeway/environment.txt
    task_file: 02_contexts/freeway/task.txt
    reward_file: 02_contexts/reward_functions/freeway_jaxatari.py

  - id: fw-q1-stay-bottom-full-context
    rq: q1
    policy_file: 01_policies/scobots/freeway/stay_bottom.py
    expected_behavior: "Keeps the chicken near the bottom, mostly moving down or waiting, and does not score crossings."
    env_file: 02_contexts/freeway/environment.txt
    task_file: 02_contexts/freeway/task.txt
    reward_file: 02_contexts/reward_functions/freeway_jaxatari.py

  - id: fw-q2-stay-bottom-no-reward
    rq: q2
    policy_file: 01_policies/scobots/freeway/stay_bottom.py
    expected_behavior: "Keeps the chicken near the bottom, mostly moving down or waiting, and does not score crossings."
    env_file: 02_contexts/freeway/environment.txt
    task_file: 02_contexts/freeway/task.txt

  - id: fw-q3-stay-bottom-full-context
    rq: q3
    policy_file: 01_policies/scobots/freeway/stay_bottom.py
    expected_behavior: "Keeps the chicken near the bottom, mostly moving down or waiting, and does not score crossings."
    env_file: 02_contexts/freeway/environment.txt
    task_file: 02_contexts/freeway/task.txt

  - id: fw-q4-aligned-stopped-cars
    rq: q4
    policy_file: 01_policies/scobots/freeway/aligned.py
    expected_behavior: "In normal Freeway it crosses successfully, but in the stopped-car tunnel setup it gets stuck in poor up/down movement and scores very little."
    env_file: 02_contexts/freeway/environment.txt
    task_file: 02_contexts/freeway/task.txt
    simplification_file: 02_contexts/simplifications/freeway_stopped_cars.txt
