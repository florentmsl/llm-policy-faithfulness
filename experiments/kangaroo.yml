defaults:
  game: kangaroo
  model: "nvidia/nemotron-3-super-120b-a12b:free"
  icl_file: 03_prompts/in_context/scobots.txt
  templates:
    q1: 03_prompts/templates/q1_research.txt
    q2: 03_prompts/templates/q2_research.txt
    q3: 03_prompts/templates/q3_research.txt
    q4: 03_prompts/templates/q4_research.txt

experiments:
  - id: kg-q1-aligned-full-context
    rq: q1
    policy_file: 01_policies/scobots/kangaroo/basic_rf.py
    expected_behavior: Upward-heavy tree (UP/UPRIGHT/UPLEFT > 95%); climbs to joey.
    env_file: 02_contexts/kangaroo/environment.txt
    task_file: 02_contexts/kangaroo/task.txt
    reward_file: 02_contexts/reward_functions/kangaroo_jaxatari.py

  - id: kg-q2-stay-ground-no-reward
    rq: q2
    policy_file: 01_policies/scobots/kangaroo/stay_ground.py
    expected_behavior: Trained with stay-ground reward; refuses to climb steadily.
    env_file: 02_contexts/kangaroo/environment.txt
    task_file: 02_contexts/kangaroo/task.txt

  - id: kg-q3-stay-ground-full-context
    rq: q3
    policy_file: 01_policies/scobots/kangaroo/stay_ground.py
    expected_behavior: Trained with stay-ground reward; refuses to climb steadily.
    env_file: 02_contexts/kangaroo/environment.txt
    task_file: 02_contexts/kangaroo/task.txt
