defaults:
  game: pong
  model: "nvidia/nemotron-3-super-120b-a12b:free"
  icl_file: 03_prompts/in_context/scobots.txt
  templates:
    q1: 03_prompts/templates/q1_research.txt
    q2: 03_prompts/templates/q2_research.txt
    q3: 03_prompts/templates/q3_research.txt
    q4: 03_prompts/templates/q4_research.txt

experiments:
  - id: pg-q1-aligned-full-context
    rq: q1
    policy_file: 01_policies/scobots/pong/aligned.py
    expected_behavior: "Moves the paddle to meet the ball, returns shots reliably, and usually wins rallies."
    env_file: 02_contexts/pong/environment.txt
    task_file: 02_contexts/pong/task.txt
    reward_file: 02_contexts/reward_functions/pong_jaxatari.py

  - id: pg-q1-ignore-ball-full-context
    rq: q1
    policy_file: 01_policies/scobots/pong/ignore_ball.py
    expected_behavior: "Moves in a structured-looking way but does not reliably track or return the ball, so it loses badly."
    env_file: 02_contexts/pong/environment.txt
    task_file: 02_contexts/pong/task.txt
    reward_file: 02_contexts/reward_functions/pong_jaxatari.py

  - id: pg-q2-ignore-ball-no-reward
    rq: q2
    policy_file: 01_policies/scobots/pong/ignore_ball.py
    expected_behavior: "Moves in a structured-looking way but does not reliably track or return the ball, so it loses badly."
    env_file: 02_contexts/pong/environment.txt
    task_file: 02_contexts/pong/task.txt

  - id: pg-q3-ignore-ball-full-context
    rq: q3
    policy_file: 01_policies/scobots/pong/ignore_ball.py
    expected_behavior: "Moves in a structured-looking way but does not reliably track or return the ball, so it loses badly."
    env_file: 02_contexts/pong/environment.txt
    task_file: 02_contexts/pong/task.txt

  - id: pg-q4-aligned-lazy-enemy
    rq: q4
    policy_file: 01_policies/scobots/pong/aligned.py
    expected_behavior: "In normal Pong it returns the ball well, but against the lazy enemy setup its play breaks down and it loses badly."
    env_file: 02_contexts/pong/environment.txt
    task_file: 02_contexts/pong/task.txt
    simplification_file: 02_contexts/simplifications/pong_lazy_enemy.txt
