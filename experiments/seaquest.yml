defaults:
  game: seaquest
  model: "nvidia/nemotron-3-super-120b-a12b:free"
  icl_file: 03_prompts/in_context/scobots.txt
  templates:
    q1: 03_prompts/templates/q1_research.txt
    q2: 03_prompts/templates/q2_research.txt
    q3: 03_prompts/templates/q3_research.txt
    q4: 03_prompts/templates/q4_research.txt

experiments:
  - id: sq-q1-aligned-full-context
    rq: q1
    policy_file: 01_policies/scobots/seaquest/aligned.py
    expected_behavior: Dive-and-fire tree; engages sharks while managing oxygen.
    env_file: 02_contexts/seaquest/environment.txt
    task_file: 02_contexts/seaquest/task.txt
    reward_file: 02_contexts/reward_functions/seaquest_jaxatari.py

  - id: sq-q2-stay-surface-no-reward
    rq: q2
    policy_file: 01_policies/scobots/seaquest/stay_surface.py
    expected_behavior: Surface-hugging tree (UP-family > 60%); does not dive to engage sharks.
    env_file: 02_contexts/seaquest/environment.txt
    task_file: 02_contexts/seaquest/task.txt

  - id: sq-q3-stay-surface-full-context
    rq: q3
    policy_file: 01_policies/scobots/seaquest/stay_surface.py
    expected_behavior: Surface-hugging tree (UP-family > 60%); does not dive to engage sharks.
    env_file: 02_contexts/seaquest/environment.txt
    task_file: 02_contexts/seaquest/task.txt
