defaults:
  game: skiing
  model: "nvidia/nemotron-3-super-120b-a12b:free"
  icl_file: 03_prompts/in_context/scobots.txt
  templates:
    q1: 03_prompts/templates/q1_research.txt
    q2: 03_prompts/templates/q2_research.txt
    q3: 03_prompts/templates/q3_research.txt
    q4: 03_prompts/templates/q4_research.txt

experiments:
  - id: sk-q1-aligned-full-context
    rq: q1
    policy_file: 01_policies/scobots/skiing/basic_rf.py
    expected_behavior: Steers LEFT/RIGHT/NOOP using flags, trees, moguls; real slalom controller.
    env_file: 02_contexts/skiing/environment.txt
    task_file: 02_contexts/skiing/task.txt
    reward_file: 02_contexts/reward_functions/skiing_jaxatari.py

  - id: sk-q2-miss-gates-no-reward
    rq: q2
    policy_file: 01_policies/scobots/skiing/miss_gates.py
    expected_behavior: Same structure as slalom controller but steering directions flipped; misses gates.
    env_file: 02_contexts/skiing/environment.txt
    task_file: 02_contexts/skiing/task.txt

  - id: sk-q3-miss-gates-full-context
    rq: q3
    policy_file: 01_policies/scobots/skiing/miss_gates.py
    expected_behavior: Same structure as slalom controller but steering directions flipped; misses gates.
    env_file: 02_contexts/skiing/environment.txt
    task_file: 02_contexts/skiing/task.txt
